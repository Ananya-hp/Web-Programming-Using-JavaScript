{% extends 'base.html' %}

{% block content %}

<h2>Edit Post</h2>

<form method="POST" class="form">
    <label>Title</label>
    <input type="text" name="title" value="{{ post.title }}" required>

    <label>Content</label>
    <textarea name="content" required>{{ post.content }}</textarea>

    <button type="submit">Update Post</button>
</form>

{% endblock %}
