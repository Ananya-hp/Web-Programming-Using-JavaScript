<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E-Commerce Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    🛒 My E-Commerce Store
</header>

<section class="products">
    <h2>Products</h2>
    <div class="product-container">

        <div class="card">
            <h3>Smartphone</h3>
            <p>₹15000</p>
            <p>Latest Android smartphone</p>
            <button onclick="addToCart('Smartphone',15000)">Add to Cart</button>
        </div>

        <div class="card">
            <h3>Laptop</h3>
            <p>₹50000</p>
            <p>High performance laptop</p>
            <button onclick="addToCart('Laptop',50000)">Add to Cart</button>
        </div>

        <div class="card">
            <h3>Headphones</h3>
            <p>₹2000</p>
            <p>Noise cancelling headphones</p>
            <button onclick="addToCart('Headphones',2000)">Add to Cart</button>
        </div>

    </div>
</section>

<section class="cart">
    <h2>Shopping Cart</h2>
    <div id="cart-items"></div>
    <h3>Total: ₹<span id="total">0</span></h3>
</section>

<section class="checkout">
    <h2>Checkout</h2>
    <input type="text" id="name" placeholder="Enter Name">
    <input type="text" id="address" placeholder="Enter Address">
    <button onclick="checkout()">Place Order</button>
    <p id="message"></p>
</section>

<script src="script.js"></script>
</body>
</html>
