<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="login-container">
        <h2>Edit Task</h2>

        <form method="POST">
            <input type="text" name="title" value="{{ task['title'] }}" required>
            <textarea name="description" rows="4" required>{{ task['description'] }}</textarea>

            <label>Due Date</label>
            <input type="date" name="due_date" value="{{ task['due_date'] }}" required>

            <label>Priority</label>
            <select name="priority" required>
                <option value="Low" {% if task['priority']=='Low' %}selected{% endif %}>Low</option>
                <option value="Medium" {% if task['priority']=='Medium' %}selected{% endif %}>Medium</option>
                <option value="High" {% if task['priority']=='High' %}selected{% endif %}>High</option>
            </select>

            <input type="number" name="expected_time" value="{{ task['expected_time'] }}" required>

            <button type="submit">Update Task</button>
            <a href="/tasks" class="btn">Back</a>
        </form>
    </div>
</body>
</html>
