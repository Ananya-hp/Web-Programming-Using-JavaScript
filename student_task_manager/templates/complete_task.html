<!DOCTYPE html>
<html>
<head>
    <title>Complete Task</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="center">
    <div class="card">

        <h2>Upload </h2>

        <form method="POST" enctype="multipart/form-data">

            <!-- FILE INPUT -->
            <label>Select PDF:</label>
            <input type="file" name="attachment" id="fileInput" accept=".pdf">

            <!-- FILE NAME -->
            <p id="fileName" style="font-size:13px; color:#555;"></p>

            <!-- 🔥 PDF PREVIEW -->
            <iframe id="preview" 
                    style="width:100%; height:250px; margin-top:10px; display:none; border-radius:8px;">
            </iframe>

            <br>

            <button type="submit">Mark as Complete</button>

        </form>

        <br>
        <a href="/dashboard">⬅ Back to Dashboard</a>

    </div>
</div>

<!-- 🔥 JAVASCRIPT -->
<script>
    const fileInput = document.getElementById("fileInput");
    const preview = document.getElementById("preview");
    const fileName = document.getElementById("fileName");

    fileInput.addEventListener("change", function() {
        const file = this.files[0];

        if (file) {
            // Show file name
            fileName.innerText = "Selected: " + file.name;

            // Preview PDF
            const fileURL = URL.createObjectURL(file);
            preview.src = fileURL;
            preview.style.display = "block";
        }
    });
</script>

</body>
</html>
